databaseChangeLog:
  - changeSet:
      id: 001-create-product-table.yaml
      author: shad
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: stock
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false

